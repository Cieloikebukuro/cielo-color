<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cielo — カラー配合</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#faf9f7;--surface:#ffffff;--surface2:#f5f3ef;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1c1a17;--text2:#7a7570;--text3:#aaa49d;
  --orange:#EB601B;--orange-light:#fdf0ea;--orange-mid:#f8d5c2;
  --gold:#c9a84c;--gold-light:#faf5e8;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-up:0 -1px 3px rgba(0,0,0,0.04),0 -4px 16px rgba(0,0,0,0.03);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg)}
body{font-family:'Noto Sans JP',sans-serif;font-weight:300;color:var(--text);font-size:14px;line-height:1.6}
.shell{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--bg)}
.topbar{flex-shrink:0;padding:14px 20px 0;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:.12em;color:var(--text)}
.logo span{color:var(--orange)}
.stylist-pill{display:flex;align-items:center;gap:6px;padding:5px 12px 5px 8px;background:var(--surface);border:0.5px solid var(--border2);border-radius:99px;cursor:pointer;transition:background .15s}
.stylist-pill:hover{background:var(--surface2)}
.stylist-avatar{width:22px;height:22px;border-radius:50%;background:var(--orange-mid);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--orange);flex-shrink:0}
.stylist-name{font-size:12px;font-weight:400;color:var(--text);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tabs{flex-shrink:0;display:flex;padding:12px 20px 0}
.tab{flex:1;padding:9px 0;font-size:12px;font-weight:400;border:none;background:transparent;cursor:pointer;font-family:inherit;color:var(--text3);border-bottom:1.5px solid var(--border);transition:all .2s;letter-spacing:.04em}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:500}
.scroll{flex:1;overflow-y:auto;padding:16px 20px 100px}
.scroll::-webkit-scrollbar{display:none}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
input[type=text],input[type=number],select,textarea{font-family:inherit;font-size:14px;font-weight:300;color:var(--text);background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;width:100%;transition:border-color .15s}
input[type=number]{text-align:right}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange);background:#fff}
input[readonly]{background:var(--surface2);color:var(--text2)}
select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23aaa49d' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
.btn-primary{width:100%;padding:13px;background:var(--orange);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:7px 14px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:background .15s}
.btn-ghost:hover{background:var(--surface2)}
.btn-icon{width:28px;height:28px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text3);font-size:16px;flex-shrink:0;transition:background .15s}
.btn-icon:hover{background:var(--surface2)}
.btn-add{font-size:12px;color:var(--orange);background:transparent;border:none;cursor:pointer;padding:4px 0;font-family:inherit;display:flex;align-items:center;gap:4px}
.toggle-row{display:flex;gap:6px;flex-wrap:wrap}
.toggle-opt{padding:5px 14px;font-size:12px;border:0.5px solid var(--border2);border-radius:99px;background:var(--surface2);cursor:pointer;font-family:inherit;color:var(--text2);transition:all .15s;white-space:nowrap}
.toggle-opt.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.pct-btn{padding:5px 10px;font-size:11px;border:0.5px solid var(--border2);border-radius:99px;background:transparent;cursor:pointer;font-family:inherit;color:var(--text3);white-space:nowrap;transition:all .15s}
.pct-btn.on{background:var(--orange-light);color:var(--orange);border-color:var(--orange-mid)}
.dye-row{display:grid;grid-template-columns:1fr 52px auto 52px 28px;gap:6px;align-items:center;margin-bottom:8px}
.dye-name-wrap{display:flex;align-items:center;gap:6px;min-width:0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pct-wrap{display:flex;align-items:center;gap:4px}
.pct-note{font-size:10px;color:var(--orange);margin:-4px 0 6px 14px}
.plex-row{display:grid;grid-template-columns:130px 1fr 70px 28px;gap:6px;align-items:center;margin-bottom:8px}
.ratio-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--surface2);border-radius:99px;font-size:11px;color:var(--text2);margin-top:8px;flex-wrap:wrap}
.oxi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.oxi-hint{font-size:11px;color:var(--text3);margin-top:6px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.metric{background:var(--surface);padding:12px 14px}
.metric .lbl{font-size:10px;color:var(--text3);margin-bottom:2px;letter-spacing:.04em}
.metric .val{font-size:18px;font-weight:400;color:var(--text)}
.metric .unit{font-size:11px;color:var(--text2);margin-left:2px}
.bar-section{padding:14px 16px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:11px;color:var(--text2);width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.bar-val{font-size:11px;color:var(--text3);width:32px;text-align:right;flex-shrink:0}
.res-table{width:100%;border-collapse:collapse;font-size:13px}
.res-table td{padding:9px 16px;border-top:0.5px solid var(--border)}
.res-table .nm{display:flex;align-items:center;gap:7px;color:var(--text2)}
.res-table .gv{text-align:right;font-weight:500;color:var(--text)}
.res-table .pv{text-align:right;color:var(--text3);font-size:11px;width:40px;padding-left:4px}
.res-table tr.total-row td{background:var(--surface2);font-weight:500}
.action-row{display:flex;gap:8px;padding:14px 16px;border-top:0.5px solid var(--border)}
.memo-label{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
textarea{resize:none;height:56px;font-size:13px}
.hist-filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.hist-filters::-webkit-scrollbar{display:none}
.filter-chip{padding:5px 14px;font-size:12px;border:0.5px solid var(--border2);border-radius:99px;background:var(--surface);cursor:pointer;font-family:inherit;color:var(--text2);white-space:nowrap;transition:all .15s;flex-shrink:0}
.filter-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.hist-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hist-date{font-size:13px;font-weight:500;color:var(--text)}
.hist-stylist{font-size:11px;padding:2px 8px;border-radius:99px}
.hist-formula{font-size:11px;color:var(--text3);line-height:1.7}
.hist-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;letter-spacing:.06em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dow{text-align:center;font-size:10px;color:var(--text3);padding:4px 0}
.cal-day{text-align:center;padding:7px 2px;font-size:12px;border-radius:6px;cursor:pointer;transition:background .12s;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:2px}
.cal-day:hover{background:var(--surface2)}
.cal-day.today{font-weight:500;color:var(--orange)}
.cal-day.selected{background:var(--orange);color:#fff}
.cal-day.other-month{color:var(--text3)}
.cal-day.has-record::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--orange);display:block}
.cal-day.selected.has-record::after{background:#fff}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding:0 0 env(safe-area-inset-bottom,16px)}
.overlay.show .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 16px}
.sheet-title{font-size:16px;font-weight:500;padding:0 20px 14px;border-bottom:0.5px solid var(--border)}
.sheet-item{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;cursor:pointer;transition:background .12s;border-bottom:0.5px solid var(--border)}
.sheet-item:last-child{border-bottom:none}
.sheet-item:hover{background:var(--surface2)}
.stylist-avatar-lg{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500}
.sheet-input-row{display:flex;gap:8px;padding:14px 20px;border-top:0.5px solid var(--border)}
.bottom-cta{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px 20px calc(env(safe-area-inset-bottom,0px) + 12px);background:rgba(250,249,247,.92);backdrop-filter:blur(12px);border-top:0.5px solid var(--border);box-shadow:var(--shadow-up)}
.col-heads{display:grid;gap:6px;margin-bottom:4px}
.col-heads.dye{grid-template-columns:1fr 52px auto 52px 28px}
.col-heads.plex{grid-template-columns:130px 1fr 70px 28px}
.col-head{font-size:10px;color:var(--text3);text-align:right}
.col-head:first-child{text-align:left}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1c1a17;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;margin-left:6px;vertical-align:middle;transition:background .3s}
.sync-dot.syncing{background:var(--orange);animation:pulse 1s infinite}
.sync-dot.ok{background:#5EC97B}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="logo">Cielo<span>.</span></div>
      <div class="sync-dot" id="sync-dot"></div>
    </div>
    <div class="stylist-pill" onclick="openStylistSheet()">
      <div class="stylist-avatar" id="top-avatar">—</div>
      <div class="stylist-name" id="top-name">読込中</div>
      <div style="font-size:10px;color:var(--text3)">▾</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('calc')">配合計算</button>
    <button class="tab" onclick="showTab('calendar')">カレンダー</button>
    <button class="tab" onclick="showTab('history')">カルテ</button>
  </div>

  <!-- CALC TAB -->
  <div class="scroll" id="tab-calc">

    <!-- スタイリスト選択 -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">担当スタイリスト</div>
      <div id="calc-stylist-selector" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    </div>

    <div class="card">
      <div class="card-title">仕上がり総量</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="total-g" value="50" min="1" step="1" style="width:68px"/>
          <span style="color:var(--text2);font-size:13px">g</span>
        </div>
        <div class="toggle-row">
          <button class="toggle-opt active" id="btn-incl" onclick="setOxiMode(true)">オキシ含む</button>
          <button class="toggle-opt" id="btn-excl" onclick="setOxiMode(false)">オキシ含まない</button>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px" id="total-hint">総量にオキシ・プレックス材も含めて逆算します</div>
    </div>

    <div class="card">
      <div class="card-title">カラー剤</div>
      <div class="col-heads dye">
        <div class="col-head" style="text-align:left">名前</div>
        <div class="col-head">比率</div>
        <div class="col-head"></div>
        <div class="col-head">g</div>
        <div class="col-head"></div>
      </div>
      <div id="dye-list"></div>
      <button class="btn-add" onclick="addDye()"><span style="font-size:16px;line-height:1">+</span> カラー剤を追加</button>
      <div id="ratio-preview" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <div class="card-title">薬剤（オキシ）</div>
      <div class="oxi-grid">
        <select id="oxi-type">
          <option>3%（10vol）</option>
          <option selected>6%（20vol）</option>
          <option>9%（30vol）</option>
          <option>12%（40vol）</option>
        </select>
        <select id="oxi-mult" onchange="updateOxiHint()">
          <option value="1">等倍（1:1）</option>
          <option value="2">2倍（1:2）</option>
          <option value="1.5">1.5倍（1:1.5）</option>
        </select>
      </div>
      <div class="oxi-hint" id="oxi-hint">カラー剤合計と同量のオキシを使用</div>
    </div>

    <div class="card">
      <div class="card-title">プレックス材</div>
      <div class="col-heads plex" id="plex-heads" style="display:none">
        <div class="col-head" style="text-align:left">種類</div>
        <div class="col-head" style="text-align:left">メモ</div>
        <div class="col-head">%</div>
        <div class="col-head"></div>
      </div>
      <div id="add-list"></div>
      <button class="btn-add" onclick="addAdditional()"><span style="font-size:16px;line-height:1">+</span> プレックス材を追加</button>
      <div style="font-size:10px;color:var(--text3);margin-top:8px">※ カラー剤＋オキシ合計に対する割合</div>
    </div>

    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <div class="memo-label">担当アシスタント</div>
          <div id="creator-selector" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px"></div>
        </div>
        <div>
          <div class="memo-label">顧客番号</div>
          <div id="customer-no-display" style="font-size:22px;font-weight:500;color:var(--orange);padding-top:4px">—</div>
          <div style="font-size:10px;color:var(--text3)" id="customer-no-hint">保存時に自動採番</div>
        </div>
      </div>
      <div class="memo-label">お客様名・メモ</div>
      <textarea id="memo" placeholder="例: 田中さん　7N ベース　やや明るめ&#10;根元2cm リタッチ"></textarea>
    </div>
    <div style="height:80px"></div>
  </div>

  <!-- CALENDAR TAB -->
  <div class="scroll" id="tab-calendar" style="display:none">
    <div class="card">
      <div class="cal-header">
        <div class="cal-month" id="cal-month-label"></div>
        <div style="display:flex;gap:4px">
          <button class="btn-ghost" onclick="calNav(-1)" style="padding:5px 10px">‹</button>
          <button class="btn-ghost" onclick="calNav(1)" style="padding:5px 10px">›</button>
        </div>
      </div>
      <div class="cal-grid">
        <div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>
        <div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div>
        <div class="cal-dow">土</div>
      </div>
      <div class="cal-grid" id="cal-days"></div>
    </div>
    <div id="cal-records"></div>
  </div>

  <!-- HISTORY TAB -->
  <div class="scroll" id="tab-history" style="display:none">
    <div class="hist-filters" id="hist-filters"></div>
    <div id="hist-list"></div>
  </div>

  <div class="bottom-cta" id="bottom-cta">
    <button class="btn-primary" onclick="calculate()">配合を計算する</button>
  </div>
</div>

<!-- RESULT SHEET -->
<div class="overlay" id="result-overlay" onclick="closeResult(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="padding:0 20px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:16px;font-weight:500">計算結果</div>
      <button class="btn-ghost" onclick="closeResultSheet()">閉じる</button>
    </div>
    <div id="result-content" style="padding:0 0 20px"></div>
  </div>
</div>

<!-- STYLIST SHEET -->
<div class="overlay" id="stylist-overlay" onclick="closeStylistSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">スタイリスト</div>
    <div id="stylist-list"></div>
    <div class="sheet-input-row">
      <input type="text" id="new-stylist-name" placeholder="新しいスタイリスト名" style="flex:1"/>
      <button class="btn-ghost" onclick="addStylist()">追加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://gvyemhjssetnozlcgnru.supabase.co';
const SUPABASE_KEY='sb_publishable_4VGbsJHUwKsCuOARSqbtiA_JTp_eWx8';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const COLORS=['#E2826A','#6AADE2','#5EC97B','#D4A84B','#A86AE2','#6AE2D4','#E26AAA'];
const PLEX_OPTIONS=['Eans0番','グリッターボンド','その他'];
const OXI_LABELS={'1':'カラー剤合計と同量のオキシを使用','2':'カラー剤合計の2倍のオキシを使用','1.5':'カラー剤合計の1.5倍のオキシを使用'};

let stylists=[],records=[],dyes=[],additionals=[];
let currentStylistId=localStorage.getItem('cielo_stylist')||null;
let oxiIncluded=true,calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let calSelected=null,histFilter='all',currentTab='calc';
let currentCreator=localStorage.getItem('cielo_creator')||null;
const CREATORS=['あやね','さわ','みな'];

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function setSyncState(s){
  const d=document.getElementById('sync-dot');
  d.className='sync-dot'+(s?' '+s:'');
}

async function init(){
  setSyncState('syncing');
  await loadStylists();
  await loadRecords();
  setSyncState('ok');
  dyes=[{name:'',ratio:1,pctOn:false,pct:10},{name:'',ratio:1,pctOn:false,pct:10}];
  renderDyes();
}

const DEFAULT_MEMBERS=[
  {name:'KEN',    color:'#EB601B'},
  {name:'Aya',    color:'#6AADE2'},
  {name:'KOYAMA', color:'#5EC97B'},
  {name:'野田',   color:'#D4A84B'},
  {name:'Sachiyo',color:'#A86AE2'},
  {name:'米津',   color:'#E26AAA'},
  {name:'伊藤',   color:'#6AE2D4'},

function updatePreview(){

function calculate(){
  const stylist=currentStylistObj();
  if(!stylist){toast('スタイリストを選択してください');return;}
  const totalInput=parseFloat(document.getElementById('total-g').value)||50;
  const oxiMult=parseFloat(document.getElementById('oxi-mult').value)||1;
  const oxiType=document.getElementById('oxi-type').value;
  const ri=dyes.filter(d=>!d.pctOn),pi=dyes.filter(d=>d.pctOn);
  const ratioSum=ri.reduce((a,d)=>a+(parseFloat(d.ratio)||0),0);
  const sumPctDye=pi.reduce((a,d)=>a+(parseFloat(d.pct)||0)/100,0);
  const sumPctPlex=additionals.reduce((a,b)=>a+(parseFloat(b.pct)||0)/100,0);
  if(ratioSum===0&&pi.length===0){toast('カラー剤を入力してください');return;}
  if(ratioSum===0){toast('比率で入力するカラー剤が1つ以上必要です');return;}

  const B=oxiIncluded
    ?totalInput/((1+sumPctDye)*(1+oxiMult)*(1+sumPctPlex))
    :totalInput/(1+sumPctDye);
  const dyeTotalG=B*(1+sumPctDye);
  const oxiG=dyeTotalG*oxiMult;
  const colorOxiTotal=dyeTotalG+oxiG;
  const dyeGrams=dyes.map(d=>d.pctOn?B*(parseFloat(d.pct)||0)/100:ratioSum>0?B*(parseFloat(d.ratio)||0)/ratioSum:0);
  const addGrams=additionals.map(a=>colorOxiTotal*(parseFloat(a.pct)||0)/100);
  const grandTotal=dyeTotalG+oxiG+addGrams.reduce((a,b)=>a+b,0);
  const addTotal=addGrams.reduce((a,b)=>a+b,0);
  const memo=document.getElementById('memo').value;

  dyes.forEach((_,i)=>{const el=document.getElementById('dye-g-'+i);if(el)el.value=dyeGrams[i].toFixed(1);});

  const allItems=[
    ...dyes.map((d,i)=>({label:(d.name||'カラー'+(i+1))+(d.pctOn?' ('+d.pct+'%)':''),g:dyeGrams[i],color:COLORS[i%COLORS.length]})),
    {label:oxiType,g:oxiG,color:'#A0BCCC'},
    ...additionals.map((a,i)=>({label:a.type+(a.name?' '+a.name:''),g:addGrams[i],color:'#B0CCAA'}))
  ];

  document.getElementById('result-content').innerHTML=`
    <div style="background:var(--orange);padding:16px 20px">
      <div style="font-size:10px;color:rgba(255,255,255,.7);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px">総量</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:#fff">${grandTotal.toFixed(1)}<span style="font-size:16px"> g</span></div>
      <div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:2px">${stylist.name}${memo?' — '+memo.split('\n')[0]:''}</div>
    </div>
    <div class="metric-grid" style="border-top:0.5px solid var(--border)">
      <div class="metric"><div class="lbl">カラー剤合計</div><div class="val">${dyeTotalG.toFixed(1)}<span class="unit">g</span></div></div>
      <div class="metric"><div class="lbl">オキシ</div><div class="val">${oxiG.toFixed(1)}<span class="unit">g</span></div></div>
      ${addTotal>0?'<div class="metric"><div class="lbl">プレックス材</div><div class="val">'+addTotal.toFixed(1)+'<span class="unit">g</span></div></div>':''}
    </div>
    <div class="bar-section">
      ${allItems.map(it=>`<div class="bar-row"><div class="bar-lbl">${it.label}</div><div class="bar-track"><div class="bar-fill" style="width:${(it.g/grandTotal*100).toFixed(1)}%;background:${it.color}"></div></div><div class="bar-val">${it.g.toFixed(1)}g</div></div>`).join('')}
    </div>
    <table class="res-table">
      ${allItems.map(it=>`<tr><td><div class="nm"><div class="dot" style="background:${it.color}"></div>${it.label}</div></td><td class="gv">${it.g.toFixed(1)} g</td><td class="pv">${(it.g/grandTotal*100).toFixed(1)}%</td></tr>`).join('')}
      <tr class="total-row"><td><div class="nm">合計</div></td><td class="gv">${grandTotal.toFixed(1)} g</td><td class="pv">100%</td></tr>
    </table>
    <div class="action-row">
      <button class="btn-primary" id="save-btn" onclick="saveRecord()">カルテに保存</button>
    </div>
  `;

  window._lastCalc={dyes:[...dyes],dyeGrams,oxiG,oxiType,oxiMult,addGrams,additionals:[...additionals],grandTotal,oxiIncluded,memo,dyeTotalG,addTotal};
  document.getElementById('result-overlay').classList.add('show');
}

function closeResult(e){if(e.target===document.getElementById('result-overlay'))closeResultSheet();}
function closeResultSheet(){document.getElementById('result-overlay').classList.remove('show');}

async function saveRecord(){
  if(!window._lastCalc)return;
  const r=window._lastCalc;
  const stylist=currentStylistObj();
  if(!stylist)return;
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='保存中...';
  setSyncState('syncing');
  const now=new Date();
  const today=now.toISOString().split('T')[0];
  // 本日のスタイリストの最大customer_noを取得して+1
  const{data:prevNos}=await sb.from('records')
    .select('customer_no')
    .eq('stylist_id',stylist.id)
    .eq('date',today)
    .order('customer_no',{ascending:false})
    .limit(1);
  const customerNo=(prevNos&&prevNos.length>0&&prevNos[0].customer_no)?prevNos[0].customer_no+1:1;
  const{data,error}=await sb.from('records').insert({
    stylist_id:stylist.id,stylist_name:stylist.name,stylist_color:stylist.color,
    date:today,memo:r.memo,
    dyes:dyes.map((d,i)=>({name:d.name||'カラー'+(i+1),ratio:d.ratio,pctOn:d.pctOn,pct:d.pct,gram:r.dyeGrams[i]})),
    oxi_g:r.oxiG,oxi_type:r.oxiType,oxi_mult:r.oxiMult,oxi_included:r.oxiIncluded,
    additionals:additionals.map((a,i)=>({type:a.type,name:a.name,pct:a.pct,gram:r.addGrams[i]})),
    grand_total:r.grandTotal,dye_total_g:r.dyeTotalG,
    creator:currentCreator||null,
    customer_no:customerNo
  }).select().single();
  if(error){toast('保存に失敗しました');setSyncState('');btn.disabled=false;btn.textContent='カルテに保存';return;}
  records.unshift(data);
  setSyncState('ok');
  closeResultSheet();
  updateCustomerNoPreview();
  toast('カルテに保存しました ✓ （'+stylist.name+' '+String(customerNo).padStart(2,'0')+'番）');
}

function showTab(t){
  ['calc','calendar','history'].forEach(n=>{
    document.getElementById('tab-'+n).style.display=n===t?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['calc','calendar','history'][i]===t);
  });
  document.getElementById('bottom-cta').style.display=t==='calc'?'':'none';
  currentTab=t;
  if(t==='calendar')renderCalendar();
  if(t==='history')renderHistory();
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function renderCalendar(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent=months[calMonth]+' '+calYear;
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const todayStr=new Date().toISOString().split('T')[0];
  const filtered=records.filter(h=>histFilter==='all'||h.stylist_id===histFilter);
  const recordDates=new Set(filtered.map(h=>h.date));
  let html='';
  for(let i=0;i<first;i++)html+='<div class="cal-day other-month">'+(prevDays-first+i+1)+'</div>';
  for(let d=1;d<=days;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    html+='<div class="cal-day'+(ds===todayStr?' today':'')+(ds===calSelected?' selected':'')+(recordDates.has(ds)?' has-record':'')+'" onclick="selectCalDay(\''+ds+'\')">'+d+'</div>';
  }
  document.getElementById('cal-days').innerHTML=html;
  renderCalRecords();
}

function selectCalDay(date){calSelected=calSelected===date?null:date;renderCalendar();}

function renderCalRecords(){
  const el=document.getElementById('cal-records');
  if(!calSelected){el.innerHTML='';return;}
  const recs=records.filter(h=>h.date===calSelected&&(histFilter==='all'||h.stylist_id===histFilter));
  const label=new Date(calSelected+'T00:00:00').toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
  if(recs.length===0){el.innerHTML='<div class="card"><div style="font-size:12px;color:var(--text3);text-align:center;padding:8px 0">'+label+' の記録はありません</div></div>';return;}
  el.innerHTML='<div style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500">'+label+' — '+recs.length+'件</div>'+recs.map(h=>histItemHTML(h)).join('');
}

function histItemHTML(h){
  const label=new Date(h.date+'T00:00:00').toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});
  const dd=h.dyes||[],aa=h.additionals||[];
  const formula=dd.map(d=>d.name+' '+parseFloat(d.gram).toFixed(1)+'g').join(' : ')
    +' + オキシ'+parseFloat(h.oxi_g).toFixed(1)+'g'
    +(aa.length>0?' + '+aa.map(a=>a.type+' '+parseFloat(a.gram).toFixed(1)+'g').join(' + '):'');
  const noLabel=h.customer_no?String(h.customer_no).padStart(2,'0')+'番':'';
  const creatorLabel=h.creator||'';
  return'<div class="hist-item"><div class="hist-top">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<div class="hist-date">'+label+'</div>'
    +(noLabel?'<span style="font-size:11px;font-weight:500;color:var(--orange);background:var(--orange-light);padding:2px 8px;border-radius:99px">'+noLabel+'</span>':'') 
    +'</div>'
    +'<span class="hist-stylist" style="background:'+h.stylist_color+'22;color:'+h.stylist_color+'">'+h.stylist_name+'</span></div>'
    +(creatorLabel?'<div style="font-size:11px;color:var(--text3);margin-bottom:4px">作成: '+creatorLabel+'</div>':'') 
    +(h.memo?'<div style="font-size:13px;color:var(--text);margin-bottom:3px">'+h.memo.split('\n')[0]+'</div>':'')
    +'<div class="hist-formula">'+formula+'</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-top:4px">総量 <strong>'+parseFloat(h.grand_total).toFixed(1)+'g</strong></div>'
    +'<div class="hist-actions"><button class="btn-ghost" onclick="loadRecord(\'"+h.id+"\')">再現する</button>'
    +'<button class="btn-ghost" onclick="deleteRecord(\'"+h.id+"\')">削除</button></div></div>';
}

function loadRecord(id){
  const h=records.find(x=>x.id===id);if(!h)return;
  dyes=(h.dyes||[]).map(d=>({name:d.name||'',ratio:d.ratio||1,pctOn:d.pctOn||false,pct:d.pct||10}));
  additionals=(h.additionals||[]).map(a=>({type:a.type||'Eans0番',name:a.name||'',pct:a.pct||10}));
  document.getElementById('oxi-type').value=h.oxi_type||'6%（20vol）';
  document.getElementById('oxi-mult').value=h.oxi_mult||1;
  document.getElementById('memo').value=h.memo||'';
  setOxiMode(h.oxi_included!==false);
  updateOxiHint();renderDyes();renderAdditionals();
  showTab('calc');toast('配合を読み込みました');
}

async function deleteRecord(id){
  if(!confirm('このカルテを削除しますか？'))return;
  setSyncState('syncing');
  await sb.from('records').delete().eq('id',id);
  records=records.filter(x=>x.id!==id);
  setSyncState('ok');toast('削除しました');
  if(currentTab==='history')renderHistory();
  if(currentTab==='calendar')renderCalRecords();
}

init();
</script>
</body>
</html>
